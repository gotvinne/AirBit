name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  micro-build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt install -y gcc python3 cmake gcc-arm-none-eabi binutils-arm-none-eabi

      - name: microinstall
        run: |
          chmod +x microinstall.sh
          ./microinstall.sh
      - name: Add micro-tools to path
        run: |
          source ./aliases.sh
          chmod +x ./aliases.sh
          ./aliases.sh
      - name: Copy src folder to sdk
        run: |
          rsync -a --delete ./src/ ./microbit-v2-sdk/source/
      - name: microbuild python
        run: |
          cd microbit-v2-sdk
          python3 build.py
        
      - name: Find generated hex files
        run: find . -name "*.hex" -type f

      - name: Upload MICROBIT.hex artifact
        uses: actions/upload-artifact@v4
        with:
          name: MICROBIT-${{ github.ref_name }}
          path: microbit-v2-sdk/MICROBIT.hex
